<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette LED Bus</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* canvas plein écran */
canvas {
    width: 100%;
    height: 80vh;
    background: black;
    image-rendering: pixelated;
}

/* contrôles */
#controls {
    margin-top: 10px;
}

button {
    font-size: 25px;
    margin: 5px;
    padding: 10px;
    background: black;
    color: #00ff6a;
    border: 2px solid #00ff6a;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="led"></canvas>

<div id="controls">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Start</button><br>
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
</div>

<script>
const canvas = document.getElementById("led");
const ctx = canvas.getContext("2d");

canvas.width = 1000;
canvas.height = 200;

/* grille LED */
const dotSize = 6;
const spacing = 4;

/* texte */
let text = "AJOUTE DES ARRETS";
let offset = canvas.width;

/* système arrêts */
let stops = [];
let index = 0;
let state = 0;

/* dessin LED */
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = "bold 80px monospace";
    ctx.fillStyle = "#00ff6a";

    // dessiner texte
    ctx.fillText(text, offset, 120);

    // effet LED : découpe en points
    let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < canvas.height; y += spacing) {
        for (let x = 0; x < canvas.width; x += spacing) {
            let i = (y * canvas.width + x) * 4;
            let alpha = imageData.data[i + 3];

            if (alpha > 128) {
                ctx.beginPath();
                ctx.arc(x, y, dotSize / 2, 0, Math.PI * 2);
                ctx.fillStyle = "#00ff6a";
                ctx.fill();
            }
        }
    }

    offset -= 2;

    if (offset < -ctx.measureText(text).width) {
        offset = canvas.width;
    }

    requestAnimationFrame(draw);
}

/* update texte */
function updateText(t) {
    text = t.toUpperCase();
    offset = canvas.width;
}

/* logique arrêts */
function show() {
    let stop = stops[index];

    if (index === stops.length - 1 && state === 1) {
        updateText("TERMINUS : " + stop);
    } else if (state === 0) {
        updateText("PROCHAIN ARRET : " + stop);
    } else {
        updateText("ARRET : " + stop);
    }
}

function next() {
    if (state === 0) {
        state = 1;
    } else {
        if (index < stops.length - 1) {
            index++;
            state = 0;
        }
    }
    show();
}

function prev() {
    if (state === 1) {
        state = 0;
    } else {
        if (index > 0) {
            index--;
            state = 1;
        }
    }
    show();
}

function addStop() {
    let val = document.getElementById("stopInput").value;
    if (val) {
        stops.push(val);
        document.getElementById("stopInput").value = "";
    }
}

function start() {
    if (stops.length > 0) {
        index = 0;
        state = 0;
        show();
    }
}

/* affichage heure */
function showTime() {
    let now = new Date();
    let t = now.toLocaleDateString("fr-FR") + " " +
            now.toLocaleTimeString("fr-FR");
    updateText(t);

    setTimeout(show, 6000);
}

setInterval(showTime, 120000);

draw();
</script>

</body>
</html>
