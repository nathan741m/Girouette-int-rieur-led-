<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette LED</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* écran LED */
#screen {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    background: radial-gradient(#003300 1px, black 1px);
    background-size: 6px 6px; /* effet LED */
}

/* texte qui défile */
#text {
    white-space: nowrap;
    font-size: 8vw;
    color: #00ff6a;
    text-shadow: 0 0 10px #00ff6a;
    position: absolute;
    animation: scroll 10s linear infinite;
}

/* animation défilement */
@keyframes scroll {
    from {
        transform: translateX(100%);
    }
    to {
        transform: translateX(-100%);
    }
}

/* boutons */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    font-size: 25px;
    background: black;
    color: #00ff6a;
    border: 2px solid #00ff6a;
    padding: 10px 20px;
    cursor: pointer;
}

/* panel */
#panel {
    position: absolute;
    top: 10px;
    left: 10px;
}

input {
    background: black;
    color: #00ff6a;
    border: 1px solid #00ff6a;
}
</style>
</head>

<body>

<div id="panel">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Start</button>
</div>

<div id="screen">
    <div id="text">Ajoute des arrêts ⚙️</div>
</div>

<div id="controls">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
</div>

<script>
let stops = [];
let index = 0;
let state = 0;

// ajouter arrêt
function addStop() {
    let val = document.getElementById("stopInput").value;
    if (val) {
        stops.push(val);
        document.getElementById("stopInput").value = "";
    }
}

// démarrer
function start() {
    index = 0;
    state = 0;
    show();
}

// affichage texte
function show() {
    let txt = "";

    let stop = stops[index];

    if (index === stops.length - 1 && state === 1) {
        txt = "TERMINUS : " + stop;
    } else if (state === 0) {
        txt = "PROCHAIN ARRÊT : " + stop;
    } else {
        txt = "ARRÊT : " + stop;
    }

    updateText(txt);
}

// update avec reset animation
function updateText(t) {
    let el = document.getElementById("text");
    el.style.animation = "none";
    el.offsetHeight; // reset animation
    el.innerText = t;
    el.style.animation = "scroll 10s linear infinite";
}

// suivant
function next() {
    if (state === 0) {
        state = 1;
    } else {
        if (index < stops.length - 1) {
            index++;
            state = 0;
        }
    }
    show();
}

// précédent
function prev() {
    if (state === 1) {
        state = 0;
    } else {
        if (index > 0) {
            index--;
            state = 1;
        }
    }
    show();
}

/* ⏰ date/heure toutes les 2 min */
function showTime() {
    let now = new Date();
    let txt = "INFO : " +
        now.toLocaleDateString("fr-FR") +
        " " +
        now.toLocaleTimeString("fr-FR");

    updateText(txt);

    setTimeout(show, 6000);
}

setInterval(showTime, 120000);
</script>

</body>
</html>
