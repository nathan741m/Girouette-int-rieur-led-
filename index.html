<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette LED PRO</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #00ff6a;
}

/* ===== ÉCRAN ===== */
#screenWrapper {
    width: 95%;
    height: 160px;
    margin-top: 40px;
    position: relative;
    overflow: hidden;
    background: black;
}

/* 🔥 FOND LED FIXE (NE BOUGE PAS) */
#ledBackground {
    position: absolute;
    inset: 0;
    display: grid;
    grid-template-rows: repeat(10, 1fr);
    z-index: 0;
    opacity: 0.15;
}

.row {
    display: flex;
}

.bgDot {
    width: 8px;
    height: 8px;
    margin: 1px;
    border-radius: 50%;
    background: #00ff6a;
}

/* 🔥 TEXTE (SEUL QUI BOUGE) */
#screen {
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: column;
    z-index: 2;
    will-change: transform;
}

.line {
    display: flex;
    white-space: nowrap;
}

/* LED texte */
.led {
    width: 6px;
    height: 6px;
    margin: 1px;
    border-radius: 50%;
    background: #002200;
}

.on {
    background: #00ff6a;
    box-shadow: 0 0 6px #00ff6a;
}

/* controls */
#controls {
    margin-top: 20px;
}

button, input {
    margin: 5px;
    padding: 8px;
    background: black;
    color: #00ff6a;
    border: 1px solid #00ff6a;
}
</style>
</head>

<body>

<div id="screenWrapper">
    <div id="ledBackground"></div>
    <div id="screen"></div>
</div>

<div id="controls">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Start</button>
</div>

<script>
const screen = document.getElementById("screen");
const bg = document.getElementById("ledBackground");

/* ===== FONT ===== */
const font = {
"A":["01110","10001","10001","11111","10001","10001","10001","00000","00000","00000"],
"B":["11110","10001","11110","10001","10001","11110","00000","00000","00000","00000"],
"C":["01110","10001","10000","10000","10001","01110","00000","00000","00000","00000"],
"D":["11100","10010","10001","10001","10010","11100","00000","00000","00000","00000"],
"E":["11111","10000","11110","10000","10000","11111","00000","00000","00000","00000"],
"F":["11111","10000","11110","10000","10000","10000","00000","00000","00000","00000"],
"G":["01110","10001","10000","10111","10001","01110","00000","00000","00000","00000"],
"H":["10001","10001","11111","10001","10001","10001","00000","00000","00000","00000"],
"I":["11111","00100","00100","00100","00100","11111","00000","00000","00000","00000"],
"J":["00111","00010","00010","10010","10010","01100","00000","00000","00000","00000"],
"K":["10001","10010","11100","10010","10001","10001","00000","00000","00000","00000"],
"L":["10000","10000","10000","10000","10000","11111","00000","00000","00000","00000"],
"M":["10001","11011","10101","10001","10001","10001","00000","00000","00000","00000"],
"N":["10001","11001","10101","10011","10001","10001","00000","00000","00000","00000"],
"O":["01110","10001","10001","10001","10001","01110","00000","00000","00000","00000"],
"P":["11110","10001","11110","10000","10000","10000","00000","00000","00000","00000"],
"Q":["01110","10001","10001","10101","10010","01101","00000","00000","00000","00000"],
"R":["11110","10001","11110","10010","10001","10001","00000","00000","00000","00000"],
"S":["01111","10000","01110","00001","10001","01110","00000","00000","00000","00000"],
"T":["11111","00100","00100","00100","00100","00100","00000","00000","00000","00000"],
"U":["10001","10001","10001","10001","10001","01110","00000","00000","00000","00000"],
"V":["10001","10001","10001","10001","01010","00100","00000","00000","00000","00000"],
"W":["10001","10001","10001","10101","11011","10001","00000","00000","00000","00000"],
"X":["10001","01010","00100","01010","10001","10001","00000","00000","00000","00000"],
"Y":["10001","01010","00100","00100","00100","00100","00000","00000","00000","00000"],
"Z":["11111","00010","00100","01000","10000","11111","00000","00000","00000","00000"],
"0":["01110","10001","10011","10101","11001","10001","01110","00000","00000","00000"],
"1":["00100","01100","00100","00100","00100","00100","01110","00000","00000","00000"],
"2":["01110","10001","00001","00010","00100","01000","11111","00000","00000","00000"],
"3":["11110","00001","00110","00001","00001","10001","01110","00000","00000","00000"],
"4":["00010","00110","01010","10010","11111","00010","00010","00000","00000","00000"],
"5":["11111","10000","11110","00001","00001","10001","01110","00000","00000","00000"],
"6":["00110","01000","10000","11110","10001","10001","01110","00000","00000","00000"],
"7":["11111","00001","00010","00100","01000","01000","01000","00000","00000","00000"],
"8":["01110","10001","01110","10001","10001","10001","01110","00000","00000","00000"],
"9":["01110","10001","10001","01111","00001","00010","01100","00000","00000","00000"],
":":["00000","00100","00000","00000","00100","00000","00000","00000","00000","00000"],
" ":["00000","00000","00000","00000","00000","00000","00000","00000","00000","00000"]
};

/* ===== FOND LED FIXE ===== */
function createBackground(){
    bg.innerHTML = "";

    for(let y=0;y<10;y++){
        let row = document.createElement("div");
        row.className = "row";

        for(let x=0;x<60;x++){
            let d = document.createElement("div");
            d.className = "bgDot";
            row.appendChild(d);
        }

        bg.appendChild(row);
    }
}
createBackground();

/* ===== FORMAT ===== */
function formatText(t){
    return t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase();
}

/* ===== RENDER TEXTE ===== */
function renderText(text){
    screen.innerHTML = "";

    let t = formatText(text);

    for(let row=0; row<10; row++){
        let line = document.createElement("div");
        line.className = "line";

        for(let c of t){
            let p = font[c] || font[" "];

            for(let i=0;i<5;i++){
                let dot = document.createElement("div");
                dot.className = "led";

                if(p[row][i] === "1"){
                    dot.classList.add("on");
                }

                line.appendChild(dot);
            }

            let space = document.createElement("div");
            space.style.width = "10px";
            line.appendChild(space);
        }

        screen.appendChild(line);
    }

    x = screenWrapper.offsetWidth;
    width = screen.scrollWidth;
}

/* ===== SCROLL ===== */
let x = 0;
let width = 0;
let speed = 2;

function loop(){
    x -= speed;

    if(-x > width){
        x = screenWrapper.offsetWidth;
        cycleCount++;
        if(cycleCount >= 2){
            cycleCount = 0;
            showNext();
        }
    }

    screen.style.transform = `translateX(${x}px)`;
    requestAnimationFrame(loop);
}

/* ===== LOGIQUE TEXTE ===== */
let stops = [];
let index = 0;
let cycleCount = 0;

/* INFO : 2 cycles date/heure */
function showTime(){
    let now = new Date();
    let txt = "INFORMATION : " + now.toLocaleString("fr-FR");

    renderText(txt);
    cycleCount = 0;
}

/* cycle texte principal */
function showNext(){
    if(stops.length === 0){
        showTime();
        return;
    }

    let stop = stops[index];
    renderText("PROCHAIN ARRET : " + stop);

    index++;
    if(index >= stops.length) index = 0;
}

/* ajout */
function addStop(){
    let v = document.getElementById("stopInput").value;
    if(v) stops.push(v);
}

/* start */
function start(){
    index = 0;
    cycleCount = 0;
    showTime();
}

/* launch */
setInterval(showTime, 20000);
loop();
</script>

</body>
</html>
