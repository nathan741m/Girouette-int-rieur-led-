<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette Bus LED</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial;
    color: #00ff6a;
    overflow: hidden;
}

/* Écran LED */
#screen {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 3vw;
    text-align: center;
    text-shadow: 0 0 10px #00ff6a;
}

/* Barres boutons */
#controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
}

button {
    background: black;
    border: 2px solid #00ff6a;
    color: #00ff6a;
    font-size: 25px;
    padding: 10px 20px;
    cursor: pointer;
}

button:hover {
    background: #00ff6a;
    color: black;
}

/* panneau paramètres */
#panel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.8);
    border: 1px solid #00ff6a;
    padding: 10px;
}
input {
    background: black;
    border: 1px solid #00ff6a;
    color: #00ff6a;
}
</style>
</head>

<body>

<div id="panel">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Démarrer</button>
</div>

<div id="screen">Ajoute des arrêts ⚙️</div>

<div id="controls">
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
</div>

<script>
let stops = [];
let index = 0;
let state = 0; // 0 = prochain arrêt, 1 = arrêt
let lastMode = "bus";

// ajouter arrêt
function addStop() {
    let val = document.getElementById("stopInput").value;
    if (val) {
        stops.push(val);
        document.getElementById("stopInput").value = "";
    }
}

// démarrer
function start() {
    if (stops.length > 0) {
        index = 0;
        state = 0;
        show();
    }
}

// affichage bus
function show() {
    if (stops.length === 0) return;

    let stop = stops[index];

    if (index === stops.length - 1 && state === 1) {
        document.getElementById("screen").innerText = "TERMINUS : " + stop;
        return;
    }

    if (state === 0) {
        document.getElementById("screen").innerText =
            "PROCHAIN ARRÊT : " + stop;
    } else {
        document.getElementById("screen").innerText =
            "ARRÊT : " + stop;
    }
}

// bouton suivant
function next() {
    if (stops.length === 0) return;

    if (state === 0) {
        state = 1;
    } else {
        if (index < stops.length - 1) {
            index++;
            state = 0;
        }
    }
    show();
}

// bouton précédent
function prev() {
    if (stops.length === 0) return;

    if (state === 1) {
        state = 0;
    } else {
        if (index > 0) {
            index--;
            state = 1;
        }
    }
    show();
}

/* ⏰ affichage date/heure toutes les 2 minutes */
function showTime() {
    let now = new Date();
    let txt =
        "📅 " + now.toLocaleDateString("fr-FR") +
        " " + now.toLocaleTimeString("fr-FR");

    document.getElementById("screen").innerText = txt;

    setTimeout(() => {
        show();
    }, 5000); // revient au bus après 5 sec
}

setInterval(showTime, 120000);
</script>

</body>
</html>
