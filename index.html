<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette Bus LED</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* écran type panneau bus */
canvas {
    width: 95%;
    height: 150px;
    margin-top: 40px;
    background: black;
    border: 2px solid #111;
}

/* contrôles */
#controls {
    margin-top: 20px;
}

button, input {
    font-size: 18px;
    margin: 5px;
    padding: 8px;
    background: black;
    color: #00ff6a;
    border: 1px solid #00ff6a;
}
</style>
</head>

<body>

<canvas id="led"></canvas>

<div id="controls">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Démarrer</button><br>
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
</div>

<script>
const canvas = document.getElementById("led");
const ctx = canvas.getContext("2d");

/* taille réelle (IMPORTANT) */
canvas.width = 1000;
canvas.height = 150;

/* config LED */
const spacing = 6;
const pixelSize = 3;

/* texte */
let text = "AJOUTE DES ARRETS";
let offset = canvas.width;

/* système arrêts */
let stops = [];
let index = 0;
let state = 0;

/* format MAJ + sans accents */
function formatText(t) {
    return t
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase();
}

/* dessin LED */
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff6a";
    ctx.font = "bold 80px monospace";

    ctx.fillText(text, offset, 100);

    let img = ctx.getImageData(0, 0, canvas.width, canvas.height);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let y = 0; y < canvas.height; y += spacing) {
        for (let x = 0; x < canvas.width; x += spacing) {
            let i = (y * canvas.width + x) * 4;

            if (img.data[i + 3] > 128) {
                ctx.fillStyle = "#00ff6a";
                ctx.fillRect(x, y, pixelSize, pixelSize);
            }
        }
    }

    offset -= 2;

    if (offset < -ctx.measureText(text).width) {
        offset = canvas.width;
    }

    requestAnimationFrame(draw);
}

/* update texte */
function updateText(t) {
    text = formatText(t);
    offset = canvas.width;
}

/* affichage */
function show() {
    if (stops.length === 0) return;

    let stop = stops[index];

    if (index === stops.length - 1 && state === 1) {
        updateText("TERMINUS : " + stop);
    } else if (state === 0) {
        updateText("PROCHAIN ARRET : " + stop);
    } else {
        updateText("ARRET : " + stop);
    }
}

/* navigation */
function next() {
    if (stops.length === 0) return;

    if (state === 0) {
        state = 1;
    } else {
        if (index < stops.length - 1) {
            index++;
            state = 0;
        }
    }
    show();
}

function prev() {
    if (stops.length === 0) return;

    if (state === 1) {
        state = 0;
    } else {
        if (index > 0) {
            index--;
            state = 1;
        }
    }
    show();
}

/* ajouter arrêt */
function addStop() {
    let val = document.getElementById("stopInput").value;

    if (val.trim() !== "") {
        stops.push(val);
        document.getElementById("stopInput").value = "";
    }
}

/* démarrer */
function start() {
    if (stops.length > 0) {
        index = 0;
        state = 0;
        show();
    }
}

/* affichage heure */
function showTime() {
    let now = new Date();

    let t =
        now.toLocaleDateString("fr-FR") +
        " " +
        now.toLocaleTimeString("fr-FR");

    updateText("INFO : " + t);

    setTimeout(show, 6000);
}

/* toutes les 2 minutes */
setInterval(showTime, 120000);

/* lancer animation */
draw();
</script>

</body>
</html>
