<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Girouette Bus LED</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* panneau */
#screen {
    width: 95%;
    height: 150px;
    margin-top: 40px;
    background: black;
    overflow: hidden;
    border: 2px solid #111;
    position: relative;
}

/* fond LED (grille) */
#screen::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(#003300 1px, black 1px);
    background-size: 6px 6px;
}

/* texte */
#text {
    position: absolute;
    white-space: nowrap;
    font-size: 80px;
    color: #00ff6a;
    text-shadow: 0 0 10px #00ff6a;
    top: 50%;
    transform: translateY(-50%);
    animation: scroll linear infinite;
}

/* défilement */
@keyframes scroll {
    from { left: 100%; }
    to { left: -100%; }
}

/* contrôles */
#controls {
    margin-top: 20px;
}

button, input {
    font-size: 18px;
    margin: 5px;
    padding: 8px;
    background: black;
    color: #00ff6a;
    border: 1px solid #00ff6a;
}
</style>
</head>

<body>

<div id="screen">
    <div id="text">AJOUTE DES ARRETS</div>
</div>

<div id="controls">
    <input id="stopInput" placeholder="Ajouter arrêt">
    <button onclick="addStop()">+</button>
    <button onclick="start()">Start</button><br>
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
</div>

<script>
let stops = [];
let index = 0;
let state = 0;

function formatText(t) {
    return t
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toUpperCase();
}

function updateText(t) {
    let el = document.getElementById("text");
    el.style.animation = "none";
    el.offsetHeight;

    el.innerText = formatText(t);

    let speed = (el.innerText.length * 0.5);
    el.style.animation = "scroll " + speed + "s linear infinite";
}

function show() {
    if (stops.length === 0) return;

    let stop = stops[index];

    if (index === stops.length - 1 && state === 1) {
        updateText("TERMINUS : " + stop);
    } else if (state === 0) {
        updateText("PROCHAIN ARRET : " + stop);
    } else {
        updateText("ARRET : " + stop);
    }
}

function next() {
    if (state === 0) {
        state = 1;
    } else {
        if (index < stops.length - 1) {
            index++;
            state = 0;
        }
    }
    show();
}

function prev() {
    if (state === 1) {
        state = 0;
    } else {
        if (index > 0) {
            index--;
            state = 1;
        }
    }
    show();
}

function addStop() {
    let val = document.getElementById("stopInput").value;
    if (val.trim() !== "") {
        stops.push(val);
        document.getElementById("stopInput").value = "";
    }
}

function start() {
    if (stops.length > 0) {
        index = 0;
        state = 0;
        show();
    }
}

/* heure */
function showTime() {
    let now = new Date();

    let t =
        now.toLocaleDateString("fr-FR") +
        " " +
        now.toLocaleTimeString("fr-FR");

    updateText("INFO : " + t);

    setTimeout(show, 6000);
}

setInterval(showTime, 120000);
</script>

</body>
</html>
